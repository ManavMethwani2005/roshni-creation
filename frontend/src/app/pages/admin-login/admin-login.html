<div class="login-container">

  <h2>Admin Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="login()">

    <input
      type="text"
      placeholder="Username"
      formControlName="username">

    <input
      type="password"
      placeholder="Password"
      formControlName="password">

    <button type="submit">
      Login
    </button>

  </form>

  <p *ngIf="error">{{ error }}</p>

</div>
